<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Successful</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #EAEAEA;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem;
    }

    .popup {
      background: white;
      border-radius: 20px;
      width: 360px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.12);
      overflow: hidden;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #666;
      padding: 4px;
      line-height: 1;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 28px 0;
    }

    .header svg {
      margin-bottom: 16px;
    }

    .header h2 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 24px;
    }

    .divider {
      border-top: 1.5px dashed #ddd;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      left: -16px;
      top: -14px;
      width: 28px;
      height: 28px;
      background: #EAEAEA;
      border-radius: 50%;
    }

    .divider::after {
      content: '';
      position: absolute;
      right: -16px;
      top: -14px;
      width: 28px;
      height: 28px;
      background: #EAEAEA;
      border-radius: 50%;
    }

    .section {
      padding: 20px 28px 0;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 14px;
    }

    table {
      width: 100%;
      font-size: 12.5px;
      border-collapse: collapse;
    }

    td {
      padding: 4px 0;
    }

    .label {
      color: #888;
      width: 50%;
    }

    .value {
      color: #555;
    }

    .badge-success {
      background: #2ECC71;
      color: white;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 4px;
      font-weight: 500;
    }

    .bold-value {
      color: #1a1a1a;
      font-weight: 700;
      text-align: right;
    }

    .right-value {
      color: #555;
      text-align: right;
    }

    .download-btn-wrap {
      padding: 20px 28px 28px;
    }

    .download-btn {
      width: 100%;
      padding: 14px;
      background: #f5f5f5;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .download-btn:hover {
      background: #ebebeb;
    }

    .wave-bottom {
      display: flex;
      justify-content: center;
      height: 14px;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div class="popup">
  <button class="close-btn" aria-label="Close">✕</button>

  <!-- Header -->
  <div class="header">
    <svg viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg" width="70" height="70">
      <rect x="8" y="14" width="42" height="46" rx="4" fill="none" stroke="#3A3AB8" stroke-width="2.5"/>
      <rect x="14" y="20" width="42" height="46" rx="4" fill="white" stroke="#3A3AB8" stroke-width="2.5"/>
      <line x1="22" y1="34" x2="46" y2="34" stroke="#3A3AB8" stroke-width="2" stroke-linecap="round"/>
      <line x1="22" y1="41" x2="38" y2="41" stroke="#3A3AB8" stroke-width="2" stroke-linecap="round"/>
      <circle cx="50" cy="50" r="12" fill="#5ECC6F"/>
      <polyline points="44,50 49,55 57,45" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h2>Payment Successful</h2>
  </div>

  <!-- Divider 1 -->
  <div class="divider"></div>

  <!-- Payment Details -->
  <div class="section">
    <p class="section-title">Payment Details</p>
    <table>
      <tr>
        <td class="label">Invoice Number</td>
        <td class="value">: &nbsp;S564 F5677 G6412</td>
      </tr>
      <tr>
        <td class="label">Order Time</td>
        <td class="value">: &nbsp;01: 09 AM, 20 June, 2025</td>
      </tr>
      <tr>
        <td class="label">Payment Method</td>
        <td class="value">: &nbsp;PayPal</td>
      </tr>
      <tr>
        <td class="label">Payment Status</td>
        <td class="value">: &nbsp;<span class="badge-success">Successful</span></td>
      </tr>
      <tr>
        <td class="label">Amount</td>
        <td class="value">: &nbsp;$37.99</td>
      </tr>
    </table>
  </div>

  <!-- Divider 2 -->
  <div class="divider" style="margin-top: 18px;"></div>

  <!-- Product Details -->
  <div class="section">
    <p class="section-title">Product Details</p>
    <table>
      <tr>
        <td class="label">Italian Panini &nbsp; x2</td>
        <td class="bold-value">$18.00</td>
      </tr>
      <tr>
        <td class="label">Delivery Charges</td>
        <td class="right-value">$1.99</td>
      </tr>
      <tr>
        <td class="label">Total Amount</td>
        <td class="right-value">$19.99</td>
      </tr>
    </table>
  </div>

  <!-- Download Button -->
  <div class="download-btn-wrap">
    <button class="download-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="#444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download PDF Receipt
    </button>
  </div>

  <!-- Wave Bottom -->
  <div class="wave-bottom">
    <svg width="360" height="14" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,0 Q9,14 18,0 Q27,14 36,0 Q45,14 54,0 Q63,14 72,0 Q81,14 90,0 Q99,14 108,0 Q117,14 126,0 Q135,14 144,0 Q153,14 162,0 Q171,14 180,0 Q189,14 198,0 Q207,14 216,0 Q225,14 234,0 Q243,14 252,0 Q261,14 270,0 Q279,14 288,0 Q297,14 306,0 Q315,14 324,0 Q333,14 342,0 Q351,14 360,0"
            fill="none" stroke="#ddd" stroke-width="1.5"/>
    </svg>
  </div>
</div>

</body>
</html>
