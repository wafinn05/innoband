<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Darurat - INNOBAND</title>
    <link rel="stylesheet" href="sos.css">
</head>
<body>

    <div class="sos-container" id="mainContainer">
        
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p style="color: #888;">Mencari data pengguna...</p>
        </div>

        <div class="sos-header">
            <div class="sos-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            </div>
            <h1 class="sos-title">Keadaan Darurat</h1>
            <p class="sos-subtitle">Gelang identitas medis ini telah di-scan.</p>
        </div>

        <div class="profile-card" id="profileCard" style="display: none;">
            <div class="profile-name">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span id="userName">Nama Pengguna</span>
            </div>
            
            <div class="info-grid">
                <div class="info-row">
                    <span class="info-label">Golongan Darah</span>
                    <span class="info-value critical" id="userBlood">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Riwayat Penyakit / Alergi</span>
                    <span class="info-value critical" id="userAllergy">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Kontak Darurat (Keluarga)</span>
                    <span class="info-value" id="userEmergencyName">-</span>
                    <span class="info-value" id="userEmergencyPhone" style="font-size: 0.9rem; color: var(--text-muted); margin-top: 0.25rem;">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Alamat Rumah</span>
                    <span class="info-value" id="userAddress" style="font-size: 0.9rem;">-</span>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-sos" id="btnReportSos">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
                Kirim Laporan Darurat
            </button>
            <a href="#" class="btn-wa" id="btnCallCs" target="_blank">
                Hubungi Customer Service
            </a>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span id="toastMsg">Sinyal darurat terkirim!</span>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module" src="firebase-db.js"></script>
    <script type="module" src="sos.js"></script>
</body>
</html>
